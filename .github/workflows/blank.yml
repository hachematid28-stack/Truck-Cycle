name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 1. تثبيت إصدار مستقر من Gradle متوافق مع أندرويد
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    # 2. توليد ملف الـ gradlew المفقود في مشروعك لتجنب أي تعارض في الإصدارات
    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 8.4

    # 3. منح صلاحية التشغيل للملف الذي تم توليده
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 4. بناء التطبيق باستخدام الـ wrapper الصحيح
    - name: Build with Gradle
      run: ./gradlew assembleDebug --stacktrace

    # 5. رفع ملف الـ APK عند النجاح
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk

name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # تحديث الجافا إلى إصدار 21 المتوافق مع المشاريع الحديثة
    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # إعداد الـ Gradle الافتراضي
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    # توليد ملف الـ wrapper بإصدار حديث ومستقر جداً (8.7)
    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 8.7

    # منح صلاحيات التشغيل للملف المولد
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # تنظيف وبناء المشروع مع إيقاف الـ cache مؤقتاً لتجنب تكرار الأخطاء السابقة
    - name: Build with Gradle
      run: ./gradlew assembleDebug --no-configuration-cache --stacktrace

    # رفع الـ APK بعد نجاح البناء للتحميل
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk


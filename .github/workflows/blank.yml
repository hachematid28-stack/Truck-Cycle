name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # يتيح لك تشغيل البناء يدوياً أيضاً

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # هذه الخطوة ستقوم بتثبيت الـ Gradle تلقائياً لأن ملف gradlew مفقود لديك
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    # أمر بناء التطبيق بدون الحاجة لـ gradlew
    - name: Build with Gradle
      run: gradle assembleDebug

    # رفع ملف الـ APK لتتمكن من تحميله
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
